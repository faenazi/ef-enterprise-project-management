name: Documentation Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2 '*.md' 'docs/**/*.md' '#node_modules'

      - name: Validate documentation structure and references
        run: python scripts/validate_docs.py
